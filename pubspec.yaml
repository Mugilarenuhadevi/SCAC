name: air_quality_app
description: "Air Quality Monitor & Neutralizer - Real-time monitoring, analytics, and AI-powered insights"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # Charts & Visualization
  fl_chart: ^0.70.2
  # Animations
  flutter_animate: ^4.5.2
  # Icons
  phosphor_flutter: ^2.1.0
  # Date/Time
  intl: ^0.20.2
  # HTTP
  http: ^1.3.0
  # Local Storage
  shared_preferences: ^2.5.3
  # Google Fonts
  google_fonts: ^6.2.1
  # Firebase
  firebase_core: ^3.10.1
  firebase_database: ^11.1.2
  # Voice & Alerts
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.1
  flutter_local_notifications: ^18.0.1
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#1E90FF"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
